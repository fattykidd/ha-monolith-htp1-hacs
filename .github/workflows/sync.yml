name: Sync and Restructure Upstream
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}  # Use a Personal Access Token instead

      - name: Fetch upstream files
        run: |
          rm -rf temp_upstream
          # Clone with full history to ensure we grab everything regardless of branch naming
          git clone --depth 1 https://github.com/TimoJJ/ha-monolith-htp1.git temp_upstream
          
          # Force create the target directory structure
          mkdir -p custom_components/monolith_htp1
          
          # Copy everything from the root of Timo's repo into your HACS folder
          cp -r temp_upstream/* custom_components/monolith_htp1/ 2>/dev/null || true
          
          # Clean up the temporary clone folder
          rm -rf temp_upstream

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/
          
          if git diff-index --quiet HEAD --; then
            echo "No changes detected from upstream."
          else
            git commit -m "Automated sync and restructure from upstream"
            git push
          fi
