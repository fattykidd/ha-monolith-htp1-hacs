name: Sync and Restructure Upstream
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}  # Use your Personal Access Token
          fetch-depth: 0                   

      - name: Fetch upstream files
        run: |
          rm -rf temp_upstream
          git clone --depth 1 https://github.com/TimoJJ/ha-monolith-htp1.git temp_upstream
          
          # Clean out the old broken structure completely to prevent leftover ghost folders
          rm -rf custom_components
          mkdir -p custom_components
          
          # TARGET ONLY THE ACTUAL INTEGRATION FOLDER
          # This prevents non-code folders like 'assets' from spilling into custom_components
          cp -r temp_upstream/monoprice_htp1 custom_components/
          
          rm -rf temp_upstream

      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force git to track removals, additions, and modifications accurately
          git add -A custom_components/
          
          if git diff-index --quiet HEAD --; then
            echo "CHANGED=false" >> $GITHUB_ENV
            echo "No changes detected from upstream."
          else
            git commit -m "Automated clean sync and restructure from upstream"
            git push
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Create Automated Release Tag
        if: env.CHANGED == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const date = new Date().toISOString().replace(/[:.]/g, '-');
            const tagName = `v1.4.0-${date.substring(0,10)}`;
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Upstream Sync ${tagName}`,
              body: 'Automated compliant build for HACS.',
              draft: false,
              prerelease: false
            });
